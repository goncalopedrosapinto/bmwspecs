<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMW Tech Specs - Base de Dados Total</title>
<style>
  :root { --primary: #111827; --accent: #2563eb; }
  body { font-family: system-ui, sans-serif; background: #f3f4f6; margin: 0; color: #1f2937; }
  
  /* Vista de Listagem */
  #vista-lista { padding: 2rem; }
  .painel-controlo { background: white; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; border: 1px solid #d1d5db; }
  .barra-pesquisa { width: 100%; padding: 1rem; font-size: 1.1rem; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; }
  
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
  .cartao { background: white; padding: 1.5rem; border-radius: 8px; border: 1px solid #e5e7eb; cursor: pointer; transition: 0.2s; }
  .cartao:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
  
  /* Vista de Detalhes (A "Nova Página") */
  #vista-detalhes { display: none; background: white; min-height: 100vh; padding: 2rem; }
  .btn-voltar { background: var(--primary); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 2rem; }
  
  .header-detalhes { border-bottom: 4px solid var(--primary); margin-bottom: 2rem; padding-bottom: 1rem; }
  .tabela-specs { width: 100%; border-collapse: collapse; }
  .tabela-specs tr:nth-child(even) { background: #f9fafb; }
  .tabela-specs td { padding: 1rem; border-bottom: 1px solid #e5e7eb; vertical-align: top; }
  .spec-label { font-weight: bold; color: #6b7280; width: 40%; }
  .spec-value { font-weight: 600; color: var(--primary); }

  /* Etiquetas */
  .tag { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 9999px; font-size: 0.75rem; font-weight: bold; margin-bottom: 0.5rem; }
  .BEV { background: #dcfce7; color: #166534; }
  .PHEV { background: #e0e7ff; color: #3730a3; }
  .Diesel { background: #fef9c3; color: #854d0e; }
  .Gasolina { background: #fee2e2; color: #991b1b; }
</style>
</head>
<body>

  <div id="vista-lista">
    <h1>BMW Specification Hub</h1>
    <div class="painel-controlo">
      <input type="text" id="pesquisa" class="barra-pesquisa" placeholder="Pesquisa em toda a base de dados (Modelo, motor, tração, etc)...">
    </div>
    <div id="catalogo" class="grid"></div>
  </div>

  <div id="vista-detalhes">
    <button class="btn-voltar" onclick="voltarParaLista()">← Voltar ao Catálogo</button>
    <div class="header-detalhes">
      <h1 id="detalhe-titulo">Modelo</h1>
      <div id="detalhe-tags"></div>
    </div>
    <table class="tabela-specs">
      <tbody id="corpo-tabela"></tbody>
    </table>
  </div>

  <script src="app.js"></script>
</body>
</html>
