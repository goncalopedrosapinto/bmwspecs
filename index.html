<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMW Technical Database</title>
<style>
  :root { --bmw-blue: #0066b1; --dark: #111827; --gray: #6b7280; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f3f4f6; margin: 0; color: var(--dark); }
  
  /* Vista de Listagem */
  #vista-lista { padding: 2rem; }
  .cabecalho { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
  .barra-pesquisa { width: 100%; max-width: 500px; padding: 0.8rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: 1rem; }
  
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
  .cartao { background: white; padding: 1.5rem; border-radius: 8px; border: 1px solid #e5e7eb; cursor: pointer; transition: 0.2s; position: relative; }
  .cartao:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
  
  /* Vista de Detalhes (Nova Página) */
  #vista-detalhes { display: none; background: white; min-height: 100vh; padding: 2rem; box-sizing: border-box; }
  .btn-voltar { background: var(--dark); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 2rem; }
  .header-info { border-bottom: 4px solid var(--bmw-blue); padding-bottom: 1rem; margin-bottom: 2rem; }
  
  .tabela-tecnica { width: 100%; border-collapse: collapse; margin-top: 1rem; }
  .tabela-tecnica tr:nth-child(even) { background: #f9fafb; }
  .tabela-tecnica td { padding: 1rem; border-bottom: 1px solid #eee; font-size: 0.95rem; }
  .label-tecnica { font-weight: 600; color: var(--gray); width: 45%; }
  .valor-tecnico { font-weight: 700; color: var(--dark); }

  /* Etiquetas de Combustível */
  .tag { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.7rem; font-weight: 800; margin-bottom: 0.5rem; text-transform: uppercase; }
  .BEV { background: #dcfce7; color: #166534; }
  .PHEV { background: #e0e7ff; color: #3730a3; }
  .Diesel { background: #fef9c3; color: #854d0e; }
  .Gasolina { background: #fee2e2; color: #991b1b; }
</style>
</head>
<body>

  <div id="vista-lista">
    <div class="cabecalho">
      <h1>Catálogo Técnico BMW</h1>
      <input type="text" id="input-pesquisa" class="barra-pesquisa" placeholder="Pesquisar por modelo, motor, chassis...">
    </div>
    <div id="catalogo-grid" class="grid"></div>
  </div>

  <div id="vista-detalhes">
    <button class="btn-voltar" onclick="fecharDetalhes()">← Voltar ao Catálogo</button>
    <div class="header-info">
      <h1 id="detalhe-nome" style="margin:0">Nome do Modelo</h1>
      <div id="detalhe-subtitulo" style="color:var(--gray); margin-top:0.5rem">Série / Chassis</div>
    </div>
    <table class="tabela-tecnica">
      <tbody id="detalhe-tabela-corpo"></tbody>
    </table>
  </div>

  <script src="app.js"></script>
</body>
</html>
