<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW Selector - Pro</title>
    <style>
        :root { --bmw-blue: #0066b1; --dark: #1c1c1c; --light-gray: #f0f0f0; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #fafafa; color: var(--dark); }
        header { background: white; padding: 1rem 2rem; border-bottom: 2px solid var(--bmw-blue); text-align: center; }
        
        .seccao-selecao { padding: 1.5rem 2rem; max-width: 1200px; margin: 0 auto; }
        .titulo-seccao { font-size: 0.9rem; font-weight: bold; color: #666; text-transform: uppercase; margin-bottom: 1rem; display: block; }
        
        /* Grelha de Botões */
        .grid-selecao { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-bottom: 2rem; }
        .btn-selecao { 
            padding: 15px 10px; border: 1px solid #ddd; background: white; border-radius: 4px; 
            cursor: pointer; font-weight: bold; transition: 0.2s; text-align: center;
        }
        .btn-selecao:hover { border-color: var(--bmw-blue); color: var(--bmw-blue); }
        .btn-selecao.ativo { background: var(--bmw-blue); color: white; border-color: var(--bmw-blue); }
        .btn-selecao:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Catalogo */
        #resultado { padding: 2rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-top: 4px solid var(--bmw-blue); }
        .card h3 { margin-top: 0; font-size: 1.2rem; }
        .detalhe { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.9rem; border-bottom: 1px solid #f0f0f0; padding-bottom: 3px; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h1>Configurador Técnico BMW</h1>
</header>

<div class="seccao-selecao">
    <span class="titulo-seccao">1. Selecione o Chassis (Modelo)</span>
    <div id="container-chassis" class="grid-selecao">
        </div>

    <div id="seccao-versao" class="hidden">
        <span class="titulo-seccao">2. Selecione a Motorização / Versão</span>
        <div id="container-versao" class="grid-selecao">
            </div>
    </div>
</div>

<div id="resultado"></div>

<script src="app.js"></script>
</body>
</html>
